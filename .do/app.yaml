# DigitalOcean App Platform spec — SaveMyHistory
name: savemyhistory
region: fra
services:
  - name: api
    source_dir: /api
    github:
      repo: VycheslavUkraincev/smh
      branch: main
      deploy_on_push: true
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    environment_slug: python
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        value: ${SUPABASE_URL}
      - key: SUPABASE_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${SUPABASE_SECRET}
      - key: SPACES_KEY
        scope: RUN_TIME
        type: SECRET
        value: ${SPACES_KEY}
      - key: SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${SPACES_SECRET}
      - key: SPACES_REGION
        scope: RUN_TIME
        value: fra1
      - key: SPACES_BUCKET
        scope: RUN_TIME
        value: smh-photos
jobs:
  - name: worker
    kind: PRE_DEPLOY
    source_dir: /worker
    github:
      repo: VycheslavUkraincev/smh
      branch: main
    run_command: python run.py
    environment_slug: python
    instance_size_slug: basic-xxs
    # ПРИМЕЧАНИЕ: для постоянной обработки очереди лучше внешний планировщик
    # (DO Functions scheduled / cron) вызывающий run.py каждые 2-5 мин,
    # либо отдельный worker-сервис с внутренним циклом. PRE_DEPLOY — заглушка для структуры.
    envs:
      - key: SUPABASE_URL
        value: ${SUPABASE_URL}
      - key: SUPABASE_SECRET
        type: SECRET
        value: ${SUPABASE_SECRET}
      - key: SPACES_KEY
        type: SECRET
        value: ${SPACES_KEY}
      - key: SPACES_SECRET
        type: SECRET
        value: ${SPACES_SECRET}
      - key: SPACES_REGION
        value: fra1
      - key: SPACES_BUCKET
        value: smh-photos
      - key: OPENAI_API_KEY
        type: SECRET
        value: ${OPENAI_API_KEY}
      - key: FAL_KEY
        type: SECRET
        value: ${FAL_KEY}

static_sites:
  - name: web
    source_dir: /public
    github:
      repo: VycheslavUkraincev/smh
      branch: main
    routes:
      - path: /
    index_document: index.html
